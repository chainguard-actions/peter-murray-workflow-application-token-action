name: Test invalid credentials error handling
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Generate a fake RSA private key for testing
        id: gen-key
        run: |
          # Generate a self-signed RSA key in PEM format (not a real GitHub App key)
          openssl genrsa -out /tmp/fake_key.pem 2048 2>/dev/null
          FAKE_KEY=$(cat /tmp/fake_key.pem)
          echo "fake_key<<EOF" >> $GITHUB_OUTPUT
          echo "$FAKE_KEY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Run action with invalid credentials (expect failure)
        id: action
        uses: .
        continue-on-error: true
        with:
          application_id: "999999"
          application_private_key: ${{ steps.gen-key.outputs.fake_key }}

      - name: Assert action failed with invalid credentials
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail with invalid credentials, but got outcome '$OUTCOME'"
            exit 1
          fi
          echo "PASS: action correctly failed with invalid credentials"
