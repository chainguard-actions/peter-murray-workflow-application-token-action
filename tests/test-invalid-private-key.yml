name: Test invalid private key format error handling
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run action with malformed private key (expect failure)
        id: action
        uses: .
        continue-on-error: true
        with:
          application_id: "123456"
          application_private_key: "this-is-not-a-valid-private-key"

      - name: Assert action failed due to invalid private key
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail with invalid private key, but got outcome '$OUTCOME'"
            exit 1
          fi
          echo "PASS: action correctly failed with invalid private key format"
