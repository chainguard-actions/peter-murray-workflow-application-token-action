name: Test with permissions input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          application_id: "12345"
          application_private_key: |
            -----BEGIN RSA PRIVATE KEY-----
            MIIEowIBAAKCAQEA2a2rwplBQLF29amygykEMmYz0+Kcj3bKBp29P2rFj7bMBxBq
            INVALID_KEY_FOR_TESTING_ONLY
            -----END RSA PRIVATE KEY-----
          permissions: "issues:read,contents:read"
      - name: Assert action ran with permissions input
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" = "success" ] || [ "$OUTCOME" = "failure" ]; then
            echo "PASS: action executed with permissions input"
          else
            echo "FAIL: unexpected outcome: $OUTCOME"
            exit 1
          fi
