name: Test with proxy and api base url inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          application_id: "12345"
          application_private_key: |
            -----BEGIN RSA PRIVATE KEY-----
            MIIEowIBAAKCAQEA0Z3VS5JJcds3xHn/ygWep4PAtEsHAOPnVe4sMKBFMhMNBqMb
            -----END RSA PRIVATE KEY-----
          github_api_base_url: "https://api.github.com"
          https_proxy: "http://proxy.example.com:8080"
      - name: Assert action ran with proxy and api base url inputs
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" = "success" ] || [ "$OUTCOME" = "failure" ]; then
            echo "PASS: action ran with https_proxy and github_api_base_url inputs"
          else
            echo "FAIL: unexpected outcome: $OUTCOME"
            exit 1
          fi
          echo "PASS"
